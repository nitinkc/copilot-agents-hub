site_name: "Learning Site Template — Your Topic Here"
site_description: "A progressive, hands-on learning guide from fundamentals to expert level. Built with best practices for clarity, interactivity, and professional presentation."
site_author: "Your Name"
site_url: https://yoursite.com/  # Update with your domain

# ============================================================
# Theme Configuration - Material with PCF color scheme
# ============================================================
theme:
  name: material
  palette:
    - scheme: light
      primary: blue
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.tabs
    - navigation.instant
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

# ============================================================
# Build Configuration
# ============================================================
docs_dir: docs
site_dir: site
edit_uri: edit/main/docs/

# ============================================================
# Plugins
# ============================================================
plugins:
  - search

# ============================================================
# Markdown Extensions
# ============================================================
markdown_extensions:
  # Core functionality
  - abbr                     # Abbreviations with hover definitions
  - admonition               # !!! blocks
  - attr_list                # CSS attributes
  - def_list                 # Definition lists
  - footnotes                # Footnote support
  - md_in_html               # Markdown inside HTML
  - tables                   # Table support
  - toc:
      permalink: true        # Clickable anchors
  
  # Code & syntax highlighting
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: docs
  
  # Advanced formatting
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details         # ??? collapsible blocks
  - pymdownx.tabbed:
      alternate_style: true
  
  # Math support
  - pymdownx.arithmatex:
      generic: true

# ============================================================
# Extra JavaScript - Custom initialization
# ============================================================
extra_javascript:
  # Mermaid diagram rendering
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js
  - js/mermaid-init.js
  
  # Math equations (MathJax)
  - js/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  
  # Theme toggle persistence
  - js/theme-toggle.js

# ============================================================
# Extra CSS
# ============================================================
extra_css:
#  - css/extra.css

# ============================================================
# Navigation Structure
# ============================================================
nav:
  - Home: index.md
  
  - Getting Started:
    - Overview: GETTING_STARTED.md
    - Learning Path: 00-introduction/01-learning-path.md
    - FAQ: 00-introduction/02-faq.md
  
  - Fundamentals:
    - Core Concepts: 01-fundamentals/01-core-concepts.md
    - Key Principles: 01-fundamentals/02-key-principles.md
  
  - Intermediate:
    - Building Blocks: 02-intermediate/01-building-blocks.md
    - Practical Applications: 02-intermediate/02-practical-applications.md
  
  - Advanced:
    - Advanced Patterns: 03-advanced/01-advanced-patterns.md
    - Production Considerations: 03-advanced/02-production-considerations.md
  
  - Reference:
    - Quick Reference: reference/01-quick-reference.md
    - Cheatsheet: reference/02-cheatsheet.md
    - Interview Q&A: reference/03-interview-qa.md
