site_name: GitHub Copilot Agents Hub
site_description: A comprehensive guide to GitHub Copilot agents, instructions, skills, and prompts
site_author: Copilot Agents Hub Team
docs_dir: docs
repo_url: https://github.com/nitinkc/copilot-agents-hub

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - abbr
  - attr_list
  - md_in_html
  - pymdownx.snippets:
      base_path: docs

nav:
  - Home: index.md
  - Fundamentals:
      - "What Are Agents, Instructions & Skills?": fundamentals/01-core-concepts.md
      - "Copilot Agents vs Agentic AI Development": fundamentals/02-copilot-agents-vs-agentic-ai.md
      - "Slash Commands vs Agents": fundamentals/03-slash-commands-vs-agents.md
  - Intermediate Concepts:
      - "How the Primitives Work Together": intermediate/01-working-together.md
  - Advanced Concepts:
      - "Advanced Patterns & Workflows": advanced/01-advanced-patterns.md
  - Reference Guides:
      - "Agents": reference/01-agents-guide.md
      - "Skills": reference/02-skills-guide.md
      - "Prompts": reference/03-prompts-guide.md
      - "Instructions": reference/04-instructions-guide.md
  - IDE Compatibility:
      - "Supported IDEs & Editors": ide-compatibility/01-overview.md
  - Agents Index: agents-index.md
  - Setup: setup.md
